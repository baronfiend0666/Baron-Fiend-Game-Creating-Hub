<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박정호의 게임기획 포트폴리오 모음 사이트</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body.intro-page {
            overflow: hidden;
            background: #000000;
            color: #ffffff;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', system-ui, sans-serif;
        }

        .intro-video-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: #000000;
        }

        .intro-video-bg iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120vw;
            height: 67.5vw;
            min-width: 177.78vh;
            min-height: 100vh;
            transform: translate(-50%, -50%);
            border: 0;
            pointer-events: none;
        }

        .intro-dim {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                radial-gradient(circle at left bottom, rgba(0, 0, 0, 0.18), transparent 34%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.52));
            pointer-events: none;
        }

        .intro-overlay {
            position: fixed;
            left: 48px;
            bottom: 42px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: min(760px, calc(100vw - 96px));
        }

        .intro-title {
            color: #ffffff;
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-decoration: none;
            text-shadow:
                0 0 18px rgba(220, 20, 60, 0.78),
                0 8px 28px rgba(0, 0, 0, 0.92);
            transition: color 0.22s ease, text-shadow 0.22s ease, transform 0.22s ease;
            font-size: clamp(22px, 3.2vw, 48px);
            line-height: 1.15;
            white-space: nowrap;
            max-width: calc(100vw - 96px);
            word-break: keep-all;
            overflow-wrap: normal;
        }

        .intro-title:hover,
        .intro-title:focus-visible {
            color: #d9b36c;
            text-shadow:
                0 0 22px rgba(217, 179, 108, 0.82),
                0 8px 30px rgba(0, 0, 0, 0.94);
            transform: translateY(-2px);
            outline: none;
        }

        .intro-guide {
            margin: 12px 0 0;
            color: rgba(255, 255, 255, 0.78);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            text-shadow: 0 4px 14px rgba(0, 0, 0, 0.9);
        }

        @media (max-width: 768px) {
            .intro-overlay {
                left: 24px;
                right: 24px;
                bottom: 32px;
                max-width: none;
            }

            .intro-title {
                font-size: clamp(32px, 10vw, 46px);
            }

            .intro-guide {
                font-size: 12px;
                letter-spacing: 0.18em;
            }
        }
    
        @media (max-width: 768px) {
            .intro-title {
                font-size: clamp(18px, 5.4vw, 30px);
                max-width: calc(100vw - 48px);
                white-space: nowrap;
                word-break: keep-all;
            }
        }

</style>
</head>
<body class="intro-page">
    <div class="intro-video-bg" aria-hidden="true">
        <iframe
            src="https://www.youtube.com/embed/DylyvoDrq6c?autoplay=1&mute=1&loop=1&playlist=DylyvoDrq6c&controls=0&disablekb=1&modestbranding=1&playsinline=1&rel=0&iv_load_policy=3"
            title="박정호의 게임기획 포트폴리오 모음 사이트 Intro Video"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

    <div class="intro-dim"></div>

    <div class="intro-overlay">
        <a href="main.html" class="intro-title" aria-label="Enter 박정호의 게임기획 포트폴리오 모음 사이트 main page">박정호의 게임기획 포트폴리오 모음 사이트</a>
        <p class="intro-guide">Click to Enter</p>
    </div>
</body>
</html>
